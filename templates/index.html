<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>San José Seguro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1a2b;
color:white;
text-align:center;
}

h2{
margin-top:10px;
}

#hud{
font-size:20px;
margin:10px;
}

canvas{
border:4px solid #1b5e20;
background:#1f6b3a;
width:95%;
max-width:1000px;
height:auto;
}

/* telefono */

#phone{
background:#111;
border-radius:15px;
color:#00ffc3;
padding:10px;
font-size:14px;
width:200px;
margin:auto;
margin-top:15px;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:30px;
}

/* escritorio */

@media(min-width:900px){

canvas{
width:1000px;
height:600px;
}

#phone{
position:absolute;
right:20px;
top:120px;
margin:0;
}

}

</style>

</head>

<body>

<h2>🚨 Simulación — Barrio San José Seguro</h2>

<div id="hud">
Alertas: <span id="reports">0</span>/5
</div>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<div id="phone">
<b>📱 San José Seguro</b>
<div id="log"></div>
</div>

<div id="overlay"></div>

<script>

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

let reports=0
let gameOver=false

let startTime=null
let timeLimit=20000

// ladrón
let thief={x:500,y:320,vx:3,vy:2}

// UPC
let upc={x:860,y:60}

// policía
let police={
x:880,
y:100,
active:false,
flash:false
}

// casas
let houses=[

{x:150,y:80},
{x:350,y:80},
{x:550,y:80},
{x:750,y:80},

{x:150,y:440},
{x:350,y:440},
{x:550,y:440},
{x:750,y:440}

]

// árboles
let trees=[

{x:100,y:200},
{x:300,y:200},
{x:700,y:200},
{x:900,y:200},

{x:100,y:520},
{x:300,y:520},
{x:700,y:520},
{x:900,y:520}

]

// alerta actual
let currentAlert=null

function log(msg){
document.getElementById("log").innerHTML+="<div>"+msg+"</div>"
}

function playSiren(){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/siren_whistle.ogg")
audio.play()

}

// alerta
function spawnAlert(){

if(reports>=5) return

let index=Math.floor(Math.random()*houses.length)

let h=houses[index]

currentAlert={
x:h.x+35,
y:h.y+75
}

}

spawnAlert()

canvas.addEventListener("click",function(e){

if(!currentAlert) return

let rect=canvas.getBoundingClientRect()

let mx=e.clientX-rect.left
let my=e.clientY-rect.top

let dx=mx-currentAlert.x
let dy=my-currentAlert.y

if(Math.sqrt(dx*dx+dy*dy)<12){

reports++

document.getElementById("reports").innerText=reports

log("🏠 Vecino envió una alerta")

spawnAlert()

if(reports==5){

currentAlert=null

police.active=true
startTime=Date.now()

playSiren()

log("🚓 Patrulla enviada desde la UPC")

}

}

})

function moveThief(){

if(gameOver) return

thief.x+=thief.vx
thief.y+=thief.vy

if(thief.x<350||thief.x>650) thief.vx*=-1
if(thief.y<260||thief.y>380) thief.vy*=-1

}

function movePolice(){

if(police.active && !gameOver){

let dx=thief.x-police.x
let dy=thief.y-police.y

police.x+=dx*0.08
police.y+=dy*0.08

police.flash=!police.flash

if(Math.abs(dx)<10 && Math.abs(dy)<10){

gameOver=true
endGame()

}

if(Date.now()-startTime>timeLimit){

gameOver=true
thiefEscaped()

}

}

}

function endGame(){

document.getElementById("overlay").style.display="flex"
document.getElementById("overlay").innerHTML="🚓 Ladrón detenido"

}

function thiefEscaped(){

document.getElementById("overlay").style.display="flex"
document.getElementById("overlay").innerHTML="⚠️ El ladrón escapó"

}

function drawTrees(){

trees.forEach(t=>{

ctx.fillStyle="#6d4c41"
ctx.fillRect(t.x+4,t.y+8,4,10)

ctx.fillStyle="#2e7d32"

ctx.beginPath()
ctx.arc(t.x,t.y,10,0,Math.PI*2)
ctx.fill()

})

}

function drawUPC(){

ctx.fillStyle="#1565c0"
ctx.fillRect(upc.x,upc.y,70,50)

ctx.fillStyle="white"
ctx.font="14px Arial"
ctx.fillText("UPC",upc.x+18,upc.y+30)

}

function drawMap(){

ctx.fillStyle="#1f6b3a"
ctx.fillRect(0,0,1000,600)

// avenida horizontal
ctx.fillStyle="#555"
ctx.fillRect(0,280,1000,80)

// avenida vertical
ctx.fillRect(460,0,80,600)

// líneas

ctx.strokeStyle="white"
ctx.setLineDash([10,10])

ctx.beginPath()
ctx.moveTo(0,320)
ctx.lineTo(1000,320)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(500,0)
ctx.lineTo(500,600)
ctx.stroke()

ctx.setLineDash([])

// casas

houses.forEach(h=>{

ctx.fillStyle="#795548"
ctx.fillRect(h.x,h.y,70,60)

ctx.fillStyle="yellow"
ctx.fillRect(h.x+20,h.y+20,10,10)
ctx.fillRect(h.x+40,h.y+20,10,10)

})

drawTrees()
drawUPC()

}

function drawAlert(){

if(!currentAlert) return

ctx.fillStyle="yellow"

ctx.beginPath()
ctx.arc(currentAlert.x,currentAlert.y,8,0,Math.PI*2)
ctx.fill()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawMap()
drawAlert()

// ladrón

ctx.fillStyle="red"
ctx.fillRect(thief.x,thief.y,25,25)

// policía

if(police.active){

ctx.fillStyle=police.flash?"red":"blue"
ctx.fillRect(police.x,police.y,25,25)

}

}

function gameLoop(){

moveThief()
movePolice()
draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
